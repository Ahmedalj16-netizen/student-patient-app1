<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student/Patient Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-box">
                <h1>Create Account</h1>
                <p class="subtitle">Join the Student/Patient Portal</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            placeholder="Enter your first name" 
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            placeholder="Enter your last name" 
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email" 
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter a password" 
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="role">Account Type</label>
                        <select id="role" name="role" required>
                            <option value="student">Student</option>
                            <option value="patient">Patient</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-login">Register</button>
                </form>
                
                <div id="messageBox" class="message-box"></div>
                
                <p class="register-link">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const messageBox = document.getElementById('messageBox');
            
            if (password.length < 6) {
                messageBox.className = 'message-box error';
                messageBox.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            try {
                const response = await fetch('/api/db?action=register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        firstName,
                        lastName,
                        email,
                        password,
                        role
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageBox.className = 'message-box success';
                    messageBox.textContent = 'Registration successful! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageBox.className = 'message-box error';
                    messageBox.textContent = data.message || 'Registration failed';
                }
            } catch (error) {
                messageBox.className = 'message-box error';
                messageBox.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
